name: cyberlaw
description: "CyberLaw Guardian - Cybersecurity Learning & Ethical Hacking Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  flutter_animate: ^4.5.0

  # Navigation
  go_router: ^14.0.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File picking
  file_picker: ^8.1.2

  # Security / Crypto
  crypto: ^3.0.3
  convert: ^3.1.1

  # Utils
  url_launcher: ^6.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/wordlists/common_passwords.txt
